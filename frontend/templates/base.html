<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta content="width=device-width, initial-scale=1.0" name="viewport">
    <title>{{ SITE_TITLE }}</title>
    <!-- HTMX -->
    <script crossorigin="anonymous"
            integrity="sha384-D1Kt99CQMDuVetoL1lrYwg5t+9QdHe7NLX/SoJYkXDFfX37iInKRy5xLSi8nO7UC"
            src="https://unpkg.com/htmx.org@1.9.10"></script>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- 在 tailwind 等之后添加 -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js" defer></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js" defer></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/tocbot/4.25.0/tocbot.min.js" defer></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/tocbot/4.25.0/tocbot.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/easymde/dist/easymde.min.css">
    <script src="https://cdn.jsdelivr.net/npm/easymde/dist/easymde.min.js" defer></script>
    <!-- Font Awesome -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css" rel="stylesheet">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Noto+Sans+SC:wght@400;500;700&display=swap"
          rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'Noto Sans SC', 'system-ui', 'sans-serif'],
                        display: ['Inter', 'Noto Sans SC', 'sans-serif'],
                    },
                    colors: {
                        primary: {
                            50: '#f0f9ff',
                            100: '#e0f2fe',
                            200: '#bae6fd',
                            300: '#7dd3fc',
                            400: '#38bdf8',
                            500: '#0ea5e9',
                            600: '#0284c7',
                            700: '#0369a1',
                            800: '#075985',
                            900: '#0c4a6e',
                        },
                        accent: {
                            50: '#fdf4ff',
                            100: '#fae8ff',
                            200: '#f5d0fe',
                            300: '#f0abfc',
                            400: '#e879f9',
                            500: '#d946ef',
                            600: '#c026d3',
                            700: '#a21caf',
                            800: '#86198f',
                            900: '#701a75',
                        }
                    }
                }
            }
        }
    </script>
    <style>
        /* 全局平滑滚动与过渡 */
        html {
            scroll-behavior: smooth;
        }

        body {
            font-feature-settings: 'cv02', 'cv03', 'cv04', 'cv11';
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        /* 卡片悬浮效果 */
        .hover-lift {
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }

        .hover-lift:hover {
            transform: translateY(-4px);
            box-shadow: 0 12px 24px -8px rgba(0, 0, 0, 0.15);
        }

        /* 淡入动画 */
        .fade-in {
            animation: fadeInUp 0.4s ease forwards;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(12px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* 自定义滚动条 */
        ::-webkit-scrollbar {
            width: 6px;
        }

        ::-webkit-scrollbar-track {
            background: transparent;
        }

        ::-webkit-scrollbar-thumb {
            background: #cbd5e1;
            border-radius: 3px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: #94a3b8;
        }
    </style>
</head>
<body class="bg-slate-50 text-slate-800 antialiased min-h-screen flex flex-col">

<!-- 导航栏：毛玻璃效果 -->
<nav class="sticky top-0 z-50 bg-white/80 backdrop-blur-md border-b border-slate-200/60 shadow-sm">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
        <div class="flex justify-between items-center h-16">
            <!-- Logo区域 -->
            <a href="{{ site_link }}"
               class="flex items-center gap-2 text-primary-600 hover:text-primary-700 transition-colors">
                <div class="w-8 h-8 bg-primary-500 rounded-lg flex items-center justify-center shadow-md">
                    <i class="fas fa-feather-alt text-white text-sm"></i>
                </div>
                <span class="text-xl font-bold tracking-tight">{{ site_title }}</span>
            </a>

            <!-- 管理员操作区 -->
            {% if is_admin %}
                <div class="flex items-center gap-3">
                    <a href="/articles/new"
                       class="inline-flex items-center px-4 py-2 bg-primary-500 hover:bg-primary-600 text-white text-sm font-medium rounded-full transition-all duration-200 shadow-md hover:shadow-lg"
                       hx-boost="true">
                        <i class="fas fa-pen-fancy mr-2"></i> 撰写
                    </a>
                    <a href="/admin/key"
                       class="inline-flex items-center px-3 py-2 text-slate-500 hover:text-slate-700 hover:bg-slate-100 rounded-full text-sm transition-colors">
                        <i class="fas fa-cog mr-1.5"></i> 管理
                    </a>
                </div>
            {% endif %}
        </div>
    </div>
</nav>

<!-- 主内容区 -->
<main class="flex-grow">
    {% block content %}{% endblock %}
</main>

<!-- 页脚：精致简约 -->
<footer class="bg-white border-t border-slate-200/70 mt-12">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
        <div class="flex flex-col sm:flex-row justify-between items-center gap-4">
            <div class="flex items-center gap-2 text-slate-500 text-sm">
                <i class="fas fa-code text-primary-400"></i>
                <span>由 <span class="font-semibold text-slate-700">FastAPI</span> + <span
                        class="font-semibold text-slate-700">HTMX</span> + <span class="font-semibold text-slate-700">Tailwind CSS</span> 驱动</span>
            </div>
            <div class="flex items-center gap-4">
                <a href="#" class="text-slate-400 hover:text-primary-500 transition-colors text-lg">
                    <i class="fab fa-github"></i>
                </a>
                <a href="#" class="text-slate-400 hover:text-primary-500 transition-colors text-lg">
                    <i class="fab fa-twitter"></i>
                </a>
                <a href="#" class="text-slate-400 hover:text-primary-500 transition-colors text-lg">
                    <i class="fab fa-linkedin-in"></i>
                </a>
            </div>
        </div>
        <div class="mt-6 pt-4 border-t border-slate-100 text-center text-xs text-slate-400">
            © {{ now().year if now else '2025' }} MarkLume · 简约不简单
        </div>
    </div>
</footer>

<!-- Toast 通知：更柔和的样式 -->
<div id="toast"
     class="fixed bottom-6 right-6 z-50 flex items-center gap-2 px-5 py-3 bg-white border border-slate-200 shadow-xl rounded-2xl text-slate-700 transform translate-y-24 opacity-0 transition-all duration-300 pointer-events-none">
    <i class="fas fa-check-circle text-emerald-500 text-lg"></i>
    <span id="toast-message" class="text-sm font-medium">操作成功</span>
</div>

<!-- 删除确认弹窗 -->
<div id="delete-modal" class="fixed inset-0 z-50 hidden">
    <!-- 背景遮罩 -->
    <div class="fixed inset-0 bg-slate-900/50 backdrop-blur-sm" onclick="hideDeleteModal()"></div>
    <!-- 弹窗内容 -->
    <div class="fixed inset-0 flex items-center justify-center p-4">
        <div class="bg-white rounded-2xl shadow-2xl max-w-md w-full p-6 transform scale-95 opacity-0 transition-all duration-200" id="delete-modal-content">
            <div class="flex items-center gap-4 mb-4">
                <div class="w-12 h-12 bg-red-100 rounded-full flex items-center justify-center">
                    <i class="fas fa-exclamation-triangle text-red-500 text-xl"></i>
                </div>
                <div>
                    <h3 class="text-lg font-semibold text-slate-800">确认删除</h3>
                    <p class="text-sm text-slate-500">此操作不可撤销</p>
                </div>
            </div>
            <p class="text-slate-600 mb-6" id="delete-modal-message">确定要删除这篇文章吗？</p>
            <div class="flex justify-end gap-3">
                <button onclick="hideDeleteModal()" class="px-4 py-2 text-sm font-medium text-slate-600 hover:text-slate-800 hover:bg-slate-100 rounded-lg transition-colors">
                    取消
                </button>
                <button id="delete-confirm-btn" class="px-4 py-2 text-sm font-medium text-white bg-red-500 hover:bg-red-600 rounded-lg transition-colors">
                    确认删除
                </button>
            </div>
        </div>
    </div>
</div>

<script>
    // 显示 Toast
    function showToast(message) {
        const toast = document.getElementById('toast');
        const toastMessage = document.getElementById('toast-message');
        if (!toast || !toastMessage) return;

        toastMessage.textContent = message;
        toast.classList.remove('translate-y-24', 'opacity-0');
        toast.classList.add('translate-y-0', 'opacity-100');

        clearTimeout(window.toastTimer);
        window.toastTimer = setTimeout(() => {
            toast.classList.add('translate-y-24', 'opacity-0');
            toast.classList.remove('translate-y-0', 'opacity-100');
        }, 3000);
    }

    // 删除确认弹窗
    let pendingDeleteUrl = null;
    let pendingDeleteTarget = null;

    function showDeleteModal(url, target, title) {
        pendingDeleteUrl = url;
        pendingDeleteTarget = target;
        const modal = document.getElementById('delete-modal');
        const content = document.getElementById('delete-modal-content');
        const message = document.getElementById('delete-modal-message');
        
        message.textContent = title ? `确定要删除「${title}」吗？` : '确定要删除这篇文章吗？';
        modal.classList.remove('hidden');
        
        setTimeout(() => {
            content.classList.remove('scale-95', 'opacity-0');
            content.classList.add('scale-100', 'opacity-100');
        }, 10);
    }

    function hideDeleteModal() {
        const modal = document.getElementById('delete-modal');
        const content = document.getElementById('delete-modal-content');
        
        content.classList.add('scale-95', 'opacity-0');
        content.classList.remove('scale-100', 'opacity-100');
        
        setTimeout(() => {
            modal.classList.add('hidden');
            pendingDeleteUrl = null;
            pendingDeleteTarget = null;
        }, 200);
    }

    document.getElementById('delete-confirm-btn').addEventListener('click', function() {
        if (pendingDeleteUrl) {
            htmx.ajax('DELETE', pendingDeleteUrl, {
                target: pendingDeleteTarget || '#article-list',
                swap: 'innerHTML'
            });
            hideDeleteModal();
        }
    });

    // 监听 HTMX 事件
    document.body.addEventListener('htmx:afterSwap', function (evt) {
        if (evt.detail.requestConfig.path.includes('/articles') &&
            (evt.detail.requestConfig.verb === 'post' || evt.detail.requestConfig.verb === 'put')) {
            showToast(evt.detail.requestConfig.verb === 'post' ? '文章发布成功' : '文章已更新');
        }
    });

    document.body.addEventListener('htmx:afterRequest', function (evt) {
        if (evt.detail.requestConfig.verb === 'delete' &&
            evt.detail.requestConfig.path.includes('/articles')) {
            showToast('文章已删除');
        }
    });
</script>
</body>
</html>
