{% if articles %}
<div class="grid gap-8 sm:grid-cols-2 lg:grid-cols-3">
    {% for article in articles %}
    <article class="group bg-white rounded-2xl shadow-sm border border-slate-200/60 overflow-hidden hover-lift fade-in">
        <a href="/articles/{{ article.id }}" class="block p-6" hx-boost="true">
            <!-- 标题 -->
            <h3 class="text-xl font-semibold text-slate-800 group-hover:text-primary-600 transition-colors line-clamp-2">
                {{ article.title }}
            </h3>
            <!-- 摘要（假设后端有 summary 属性，否则可截断 content 纯文本） -->
            {% if article.summary %}
            <p class="mt-3 text-slate-500 text-sm leading-relaxed line-clamp-3">
                {{ article.summary }}
            </p>
            {% endif %}
            <!-- 元信息 -->
            <div class="mt-4 flex items-center text-xs text-slate-400">
                <i class="far fa-calendar-alt mr-1.5"></i>
                <time>{{ article.created_at.strftime('%Y-%m-%d') }}</time>
                <span class="mx-2">·</span>
                <i class="far fa-clock mr-1.5"></i>
                <span>{{ article.updated_at.strftime('%Y-%m-%d') }}</span>
            </div>
        </a>
    </article>
    {% endfor %}
</div>
{% else %}
<div class="text-center py-20 text-slate-400">
    <i class="fas fa-inbox text-5xl mb-4"></i>
    <p class="text-lg">暂无文章，静待墨香</p>
</div>
{% endif %}
