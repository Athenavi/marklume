{% extends "base.html" %}

{% block content %}
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/easymde/dist/easymde.min.css">

<!-- 固定操作栏 -->
<div class="sticky top-16 z-10 bg-white/95 backdrop-blur-sm border-b border-slate-200 shadow-sm">
    <div class="max-w-4xl mx-auto px-4 sm:px-6 lg:px-8 py-3">
        <div class="flex flex-col sm:flex-row sm:items-center gap-3 mb-2">
            <input type="text" id="title" name="title"
                   value="{% if article %}{{ article.title }}{% endif %}"
                   placeholder="文章标题"
                   class="flex-1 text-xl font-bold text-slate-900 placeholder-slate-400 bg-transparent border-none outline-none focus:ring-0"
                   required>
            <div class="flex items-center gap-2">
                <a href="{% if article %}/articles/{{ article.id }}{% else %}/{% endif %}"
                   class="inline-flex items-center px-4 py-2 rounded-full bg-slate-100 hover:bg-slate-200 text-slate-600 transition-colors"
                   hx-boost="true">取消</a>
                <button type="submit" form="article-form"
                        class="inline-flex items-center px-6 py-2 rounded-full bg-primary-500 hover:bg-primary-600 text-white font-medium shadow-sm transition-colors">
                    {% if article %}更新{% else %}发布{% endif %}
                </button>
            </div>
        </div>

        <!-- 自定义工具栏 -->
        <div id="md-toolbar" class="flex flex-wrap items-center gap-1 py-1 border-t border-slate-100">
            <!-- 由 JS 动态生成 -->
        </div>
    </div>
</div>

<!-- 编辑器主体 -->
<div class="max-w-4xl mx-auto px-4 sm:px-6 lg:px-8 py-6">
    <form id="article-form"
          {% if article %}hx-put="{{ action }}"{% else %}hx-post="{{ action }}"{% endif %}
          hx-target="body" hx-swap="innerHTML">
        {% if article %}<input type="hidden" name="article_id" value="{{ article.id }}">{% endif %}
        <div class="bg-white rounded-xl border border-slate-200 shadow-sm overflow-hidden">
            <textarea id="content" name="content">{% if article %}{{ article.content }}{% endif %}</textarea>
        </div>
    </form>
</div>

<script>
(function() {
    let easyMDEInstance = null;

    const toolbarActions = [
        { icon: 'fa-bold', title: '加粗', action: 'toggleBold' },
        { icon: 'fa-italic', title: '斜体', action: 'toggleItalic' },
        { icon: 'fa-heading', title: '标题', action: 'toggleHeadingSmaller' },
        { icon: 'fa-quote-right', title: '引用', action: 'toggleBlockquote' },
        { icon: 'fa-list-ul', title: '无序列表', action: 'toggleUnorderedList' },
        { icon: 'fa-list-ol', title: '有序列表', action: 'toggleOrderedList' },
        { icon: 'fa-link', title: '链接', action: 'drawLink' },
        { icon: 'fa-image', title: '图片', action: 'drawImage' },
        { icon: 'fa-table', title: '表格', action: 'drawTable' },
        { icon: 'fa-eye', title: '预览', action: 'togglePreview' },
        { icon: 'fa-columns', title: '分屏预览', action: 'toggleSideBySide' },
        { icon: 'fa-expand', title: '全屏', action: 'toggleFullScreen' },
    ];

    function buildToolbar() {
        const toolbar = document.getElementById('md-toolbar');
        if (!toolbar) return;
        toolbar.innerHTML = '';
        toolbarActions.forEach(item => {
            const btn = document.createElement('button');
            btn.type = 'button';
            btn.className = 'p-2 rounded-lg text-slate-600 hover:bg-slate-100 hover:text-slate-800 transition-colors';
            btn.title = item.title;
            btn.innerHTML = `<i class="fas ${item.icon}"></i>`;
            btn.addEventListener('click', (e) => {
                e.preventDefault();
                if (easyMDEInstance && typeof easyMDEInstance[item.action] === 'function') {
                    easyMDEInstance[item.action]();
                }
            });
            toolbar.appendChild(btn);
        });
    }

    function initEditor(retries = 20) {
        // 防止重复初始化
        if (document.querySelector('.EasyMDEContainer')) {
            console.log('编辑器已存在，跳过');
            return;
        }

        const textarea = document.getElementById('content');
        if (!textarea) {
            if (retries > 0) {
                setTimeout(() => initEditor(retries - 1), 100);
            } else {
                console.error('初始化编辑器失败：找不到 textarea#content');
            }
            return;
        }

        if (typeof EasyMDE === 'undefined') {
            console.error('EasyMDE 库未加载，请检查 base.html 中是否引入');
            return;
        }

        easyMDEInstance = new EasyMDE({
            element: textarea,
            autofocus: true,
            spellChecker: false,
            toolbar: false,
            status: false,
            placeholder: '开始用 Markdown 书写...',
            previewRender: function(plainText) {
                if (typeof marked !== 'undefined') return marked.parse(plainText);
                return plainText;
            }
        });

        buildToolbar();
        console.log('✅ 编辑器初始化成功');

        // 确保默认工具栏隐藏
        const defaultToolbar = document.querySelector('.editor-toolbar');
        if (defaultToolbar) defaultToolbar.style.display = 'none';
    }

    // 三个入口确保初始化
    if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', () => initEditor());
    } else {
        setTimeout(() => initEditor(), 50);
    }

    document.body.addEventListener('htmx:afterSettle', function handler() {
        document.body.removeEventListener('htmx:afterSettle', handler);
        initEditor();
    });
})();
</script>

<style>
    .editor-toolbar {
        display: none !important;
    }
    .EasyMDEContainer {
        border: none !important;
        box-shadow: none !important;
    }
    .EasyMDEContainer .CodeMirror {
        min-height: 60vh;
        border-radius: 0.75rem;
        border: none !important;
    }
</style>
{% endblock %}
