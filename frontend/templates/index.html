{% extends "base.html" %}

{% block content %}
<div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-12">
    <!-- 头部 -->
    <div class="text-center mb-16">
        <h1 class="text-4xl font-extrabold text-slate-800 sm:text-5xl lg:text-6xl">
            <span class="bg-clip-text text-transparent bg-gradient-to-r from-primary-500 to-accent-500">
                MarkLume
            </span>
        </h1>
        <p class="mt-4 text-lg text-slate-500 max-w-2xl mx-auto">
            用极简记录思考，用文字雕刻时光
        </p>
    </div>

    <!-- 工具栏 -->
    <div class="flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4 mb-10">
        <h2 class="text-2xl font-bold text-slate-700">
            <i class="fas fa-newspaper text-primary-500 mr-2"></i>最新文章
        </h2>
        <div class="relative w-full sm:w-80">
            <input
                type="text"
                placeholder="搜索文章..."
                class="w-full pl-10 pr-4 py-3 rounded-xl border border-slate-200 bg-white shadow-sm focus:outline-none focus:ring-2 focus:ring-primary-300 focus:border-transparent transition-all"
                hx-get="/articles?search="
                hx-trigger="keyup changed delay:300ms"
                hx-target="#article-list"
                hx-swap="innerHTML"
                name="search"
            >
            <i class="fas fa-search absolute left-3 top-3.5 text-slate-400"></i>
        </div>
    </div>

    <!-- 文章列表（通过 HTMX 局部刷新） -->
    <div id="article-list">
        {% include "partials/article_list.html" %}
    </div>
</div>
{% endblock %}
