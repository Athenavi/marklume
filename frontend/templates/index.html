{% extends "base.html" %}

{% block content %}
<div class="max-w-6xl mx-auto px-4 sm:px-6 lg:px-8 py-12 sm:py-16">
    <!-- 头部区域 -->
    <header class="mb-12 sm:mb-16">
        <div class="max-w-2xl">
            <h1 class="text-4xl sm:text-5xl font-bold tracking-tight text-neutral-900 dark:text-white">
                {{ site_title }}
            </h1>
            <p class="mt-4 text-lg text-neutral-600 dark:text-neutral-400 leading-relaxed">
                用极简记录思考，用文字雕刻时光
            </p>
        </div>
    </header>

    {% if pages %}
    <!-- 自定义页面 -->
    <section class="mb-12 sm:mb-16">
        <h2 class="text-sm font-medium text-neutral-500 dark:text-neutral-400 uppercase tracking-wider mb-6">
            页面导航
        </h2>
        <div class="grid gap-3 sm:grid-cols-2 lg:grid-cols-3">
            {% for page in pages %}
            <a href="/pages/{{ page.filename }}"
               class="group flex items-center gap-3 p-4 rounded-xl border border-neutral-200 dark:border-neutral-800 bg-white dark:bg-neutral-900/50 hover:border-neutral-300 dark:hover:border-neutral-700 hover:shadow-sm transition-all">
                <div class="flex-shrink-0 w-9 h-9 rounded-lg bg-neutral-100 dark:bg-neutral-800 flex items-center justify-center group-hover:bg-neutral-200 dark:group-hover:bg-neutral-700 transition-colors">
                    <i class="fas fa-file-alt text-sm text-neutral-500 dark:text-neutral-400"></i>
                </div>
                <div class="flex-1 min-w-0">
                    <span class="text-sm font-medium text-neutral-900 dark:text-white group-hover:text-neutral-600 dark:group-hover:text-neutral-300 transition-colors truncate block">
                        {{ page.title }}
                    </span>
                </div>
                <i class="fas fa-arrow-right text-xs text-neutral-300 dark:text-neutral-600 group-hover:text-neutral-500 dark:group-hover:text-neutral-400 group-hover:translate-x-0.5 transition-all flex-shrink-0"></i>
            </a>
            {% endfor %}
        </div>
    </section>
    {% endif %}

    <!-- 工具栏 -->
    <div class="flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4 mb-8">
        <h2 class="text-sm font-medium text-neutral-500 dark:text-neutral-400 uppercase tracking-wider">
            最新文章
        </h2>
        <!-- 搜索框 -->
        <div class="relative w-full sm:w-72">
            <input
                id="search-input"
                type="text"
                placeholder="搜索文章..."
                class="w-full pl-10 pr-4 py-2.5 rounded-xl border border-neutral-200 dark:border-neutral-800 bg-white dark:bg-neutral-900 text-neutral-900 dark:text-white placeholder-neutral-400 dark:placeholder-neutral-500 focus:outline-none focus:ring-2 focus:ring-neutral-900 dark:focus:ring-white focus:border-transparent transition-all text-sm"
            >
            <i class="fas fa-search absolute left-3.5 top-3 text-neutral-400 dark:text-neutral-500 text-sm"></i>
        </div>
    </div>

    <!-- 文章列表 -->
    <div id="article-list">
        {% include "partials/article_list.html" %}
    </div>

    <!-- 搜索无结果提示 -->
    <div id="search-empty" class="hidden text-center py-20">
        <div class="inline-flex items-center justify-center w-16 h-16 rounded-full bg-neutral-100 dark:bg-neutral-800 mb-4">
            <i class="fas fa-search text-2xl text-neutral-400 dark:text-neutral-500"></i>
        </div>
        <p class="text-neutral-500 dark:text-neutral-400">没有找到匹配的文章</p>
        <p class="text-sm text-neutral-400 dark:text-neutral-500 mt-1">试试其他关键词</p>
    </div>
</div>

<script>
(function() {
    const searchInput = document.getElementById('search-input');
    const articleList = document.getElementById('article-list');
    const searchEmpty = document.getElementById('search-empty');

    searchInput.addEventListener('input', function() {
        const query = this.value.trim().toLowerCase();
        const articles = articleList.querySelectorAll('article[data-title]');
        let visibleCount = 0;

        articles.forEach(function(article) {
            const title = (article.getAttribute('data-title') || '').toLowerCase();
            const match = !query || title.indexOf(query) !== -1;
            article.style.display = match ? '' : 'none';
            if (match) visibleCount++;
        });

        // 显示/隐藏分页
        var nav = articleList.querySelector('nav');
        if (nav) nav.style.display = query ? 'none' : '';

        // 显示/隐藏无结果提示
        searchEmpty.classList.toggle('hidden', visibleCount > 0);
        articleList.style.display = visibleCount === 0 && query ? 'none' : '';
    });
})();
</script>
{% endblock %}
